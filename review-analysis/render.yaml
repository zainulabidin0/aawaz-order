services:
  - type: web
    name: aawaz-review-analysis
    runtime: python
    rootDir: review-analysis
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ALLOWED_ORIGINS
        value: "*"
